
<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Confess Anonymous</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:linear-gradient(135deg,#020617,#0f172a);
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
color:white;
}

.card{
width:100%;
max-width:520px;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(14px);
padding:30px;
border-radius:24px;
box-shadow:0 10px 30px rgba(0,0,0,.4);
}

.top-menu{
display:flex;
gap:10px;
margin-bottom:20px;
}

.top-menu a{
flex:1;
text-decoration:none;
padding:12px;
border-radius:12px;
text-align:center;
font-weight:bold;
background:#1e293b;
color:white;
transition:.3s;
}

.top-menu a:hover{
background:#334155;
}

h1{
text-align:center;
font-size:34px;
margin-bottom:10px;
}

.desc{
text-align:center;
color:#cbd5e1;
margin-bottom:25px;
}

input, textarea{
width:100%;
padding:14px;
margin-bottom:15px;
border:none;
border-radius:14px;
background:#f8fafc;
font-size:15px;
}

textarea{
height:140px;
resize:none;
}

button{
width:100%;
padding:14px;
border:none;
border-radius:14px;
background:#2563eb;
color:white;
font-size:16px;
font-weight:bold;
cursor:pointer;
}

button:hover{
background:#1d4ed8;
}
</style>
</head>
<body>

<div class="card">

<div class="top-menu">
<a href="/">Kirim Confess</a>
<a href="/reply">Balas Confess</a>
</div>

<h1>Confess Anonymous</h1>

<p class="desc">
Kirim pesan anonim secara rahasia 💌
</p>

<form id="confessForm">
<input type="text" id="nama" placeholder="Nama kamu" required>
<input type="text" id="nomor" placeholder="628xxxxxxxxxx" required>
<textarea id="pesan" placeholder="Isi pesan..." required></textarea>

<button type="submit">Kirim Confess</button>
</form>

</div>

<script>
document.getElementById('confessForm').addEventListener('submit', async(e)=>{
e.preventDefault();

const data = {
nama: document.getElementById('nama').value,
nomor: document.getElementById('nomor').value,
pesan: document.getElementById('pesan').value
};

try{

const req = await fetch('/send-confess',{
method:'POST',
headers:{
'Content-Type':'application/json'
},
body:JSON.stringify(data)
});

const res = await req.json();

if(res.status){
alert('Confess berhasil dikirim!\nID: ' + res.id);
document.getElementById('confessForm').reset();
}else{
alert(res.message || 'Gagal mengirim confess');
}

}catch(err){
alert('Server error / env belum di setting');
}

});
</script>

</body>
</html>
